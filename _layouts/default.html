<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  <!-- Minima テーマの main.css（ハイライト含む） -->
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">

  <!-- 自前のナビ用 CSS -->
  <link rel="stylesheet" href="{{ '/assets/custom.css' | relative_url }}">

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5X2BP69THZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5X2BP69THZ');
  </script>

  <!-- ここに MathJax 関連をまとめて入れる -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>


<body>

  <div style="display:flex; align-items:flex-start; gap:2rem; padding:1rem;">

    <!-- 左ナビ -->
    <nav style="width:max-content; position:sticky; top:1rem; padding:0 1rem 0 0; border-right:1px solid #ddd;">
      <div id="nav-python" {% if page.section == "python" %}{% else %}style="display:none;"{% endif %}>
      <h2 style="margin-left:0;">PyQUBO++<br> Information</h2>
      <ul class="nav-large" style="list-style:none; padding-left:0; margin-left:0;">
        <li><a href="{{ '/python/' | relative_url }}"><strong>Introduction</strong></a></li>
        <li><a href="{{ '/python/DOCUMENT' | relative_url }}"><strong>Document</strong></a></li>
        <li><a href="{{ '/DEMOS' | relative_url }}#from=python"><strong>Demos</strong></a></li>
      </ul>
      <hr style="margin:1rem 0;">
      <ul class="nav-large" style="list-style:none; padding-left:0; margin-left:0;">
        <li><a href="{{ '/' | relative_url }}"><strong>&larr; QUBO++</strong></a></li>
      </ul>
      </div>
      <div id="nav-cpp" {% if page.section == "python" %}style="display:none;"{% endif %}>
      <h2 style="margin-left:0;">QUBO++<br> Information</h2>
      <ul class="nav-large" style="list-style:none; padding-left:0; margin-left:0;">
        <li><a href="{{ '/' | relative_url }}"><strong>Introduction</strong></a> </li>
        <li><a href="{{ '/HUBO_QUBO' | relative_url }}"><strong>HUBO and QUBO</strong></a> </li>
        <li><a href="{{ '/QUICK' | relative_url }}"><strong>Quick Start</strong></a>
          <ul style="list-style:none; padding-left:1.2em; margin:0.2em 0 0.2em;">
            <li><a href="{{ '/WSL' | relative_url }}"><strong>for Windows</strong></a></li>
          </ul>
        </li>
        <li><a href="{{ '/DOCUMENT' | relative_url }}"><strong>Document</strong></a></li>
        <li><a href="{{ '/CASE_STUDIES' | relative_url }}"><strong>Case Studies</strong></a></li>
        <li><a href="{{ '/DEMOS' | relative_url }}"><strong>Demos</strong></a></li>
        <li><a href="https://github.com/nakanocs/qbpp/releases/latest"><strong>Latest Release</strong></a></li>
      </ul>
      <hr style="margin:1rem 0;">
      <ul class="nav-large" style="list-style:none; padding-left:0; margin-left:0;">
        <li><a href="{{ '/python/' | relative_url }}"><strong>PyQUBO++ &rarr;</strong></a></li>
      </ul>
      </div>
    </nav>
    <script>
    (function() {
      if (window.location.hash === '#from=python') {
        document.getElementById('nav-python').style.display = '';
        document.getElementById('nav-cpp').style.display = 'none';
      }
    })();
    </script>

    <!-- 右側：ページごとの本文 -->
    <main style="flex:1;min-width:0;">
      {{ content }}
      {% include footer.html %}
    </main>
  </div>
</body>

</html>
