<hr style="margin: 1rem 0;">
<div style="padding: 0 1rem 1rem; text-align: center;">
  <button id="switch-cpp" onclick="switchNav('cpp')"
    style="font-weight:bold; padding:0.4rem 0.8rem; cursor:pointer; border:1px solid #ccc; border-radius:4px; margin-right:0.3rem;">
    QUBO++ (C++)
  </button>
  <button id="switch-python" onclick="switchNav('python')"
    style="font-weight:bold; padding:0.4rem 0.8rem; cursor:pointer; border:1px solid #ccc; border-radius:4px;">
    PyQBPP
  </button>
</div>

<script>
(function() {
  function getTopLevelItems() {
    var siteNav = document.querySelector('.site-nav');
    if (!siteNav) return { cpp: [], python: [] };
    // Get the first ul.nav-list which contains top-level items
    var allUls = siteNav.getElementsByClassName('nav-list');
    var topUl = null;
    for (var i = 0; i < allUls.length; i++) {
      if (allUls[i].parentNode === siteNav || allUls[i].parentNode.classList.contains('site-nav')) {
        topUl = allUls[i];
        break;
      }
    }
    if (!topUl) return { cpp: [], python: [] };

    var cpp = [], python = [];
    var children = topUl.children;
    for (var i = 0; i < children.length; i++) {
      if (children[i].tagName !== 'LI') continue;
      var links = children[i].getElementsByTagName('a');
      if (links.length === 0) continue;
      // Find the direct link (first a that is nav-list-link)
      var text = '';
      var href = '';
      for (var j = 0; j < links.length; j++) {
        if (links[j].classList.contains('nav-list-link')) {
          text = links[j].textContent.trim();
          href = links[j].getAttribute('href') || '';
          break;
        }
      }
      if (text === 'PyQBPP' || href.indexOf('/python') !== -1) {
        python.push(children[i]);
      } else {
        cpp.push(children[i]);
      }
    }
    return { cpp: cpp, python: python };
  }

  function setButtonStyle(activeId, inactiveId) {
    var active = document.getElementById(activeId);
    var inactive = document.getElementById(inactiveId);
    if (active) {
      active.style.background = '#7253ed';
      active.style.color = '#fff';
      active.style.borderColor = '#7253ed';
    }
    if (inactive) {
      inactive.style.background = '';
      inactive.style.color = '';
      inactive.style.borderColor = '#ccc';
    }
  }

  window.switchNav = function(mode) {
    var nav = getTopLevelItems();
    if (nav.cpp.length === 0 && nav.python.length === 0) return;
    if (mode === 'python') {
      for (var i = 0; i < nav.cpp.length; i++) nav.cpp[i].style.display = 'none';
      for (var i = 0; i < nav.python.length; i++) nav.python[i].style.display = '';
      setButtonStyle('switch-python', 'switch-cpp');
    } else {
      for (var i = 0; i < nav.python.length; i++) nav.python[i].style.display = 'none';
      for (var i = 0; i < nav.cpp.length; i++) nav.cpp[i].style.display = '';
      setButtonStyle('switch-cpp', 'switch-python');
    }
    try { localStorage.setItem('qbpp-nav-mode', mode); } catch(e) {}
  };

  function init() {
    var saved = null;
    try { saved = localStorage.getItem('qbpp-nav-mode'); } catch(e) {}
    var onPython = window.location.pathname.indexOf('/python') !== -1;
    var mode = onPython ? 'python' : (saved || 'cpp');
    switchNav(mode);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
