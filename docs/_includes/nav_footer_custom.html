<hr style="margin: 1rem 0;">
<div style="padding: 0 1rem 1rem; text-align: center;">
  <button id="switch-cpp"
    style="font-weight:bold; padding:0.4rem 0.8rem; cursor:pointer; border:1px solid #ccc; border-radius:4px; margin-right:0.3rem;">
    QUBO++ (C++)
  </button>
  <button id="switch-python"
    style="font-weight:bold; padding:0.4rem 0.8rem; cursor:pointer; border:1px solid #ccc; border-radius:4px;">
    PyQBPP
  </button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var siteNav = document.getElementById('site-nav');
  if (!siteNav) return;

  // Collect top-level li elements
  var firstUl = siteNav.querySelector('ul.nav-list');
  if (!firstUl) return;

  var cppItems = [];
  var pythonItems = [];
  var lis = firstUl.children;
  for (var i = 0; i < lis.length; i++) {
    if (lis[i].tagName !== 'LI') continue;
    var a = lis[i].querySelector('a');
    if (a && a.textContent.trim() === 'PyQBPP') {
      pythonItems.push(lis[i]);
    } else {
      cppItems.push(lis[i]);
    }
  }

  var btnCpp = document.getElementById('switch-cpp');
  var btnPython = document.getElementById('switch-python');

  function showCpp() {
    for (var i = 0; i < cppItems.length; i++) cppItems[i].style.display = '';
    for (var i = 0; i < pythonItems.length; i++) pythonItems[i].style.display = 'none';
    btnCpp.style.background = '#7253ed';
    btnCpp.style.color = '#fff';
    btnCpp.style.borderColor = '#7253ed';
    btnPython.style.background = '';
    btnPython.style.color = '';
    btnPython.style.borderColor = '#ccc';
    try { localStorage.setItem('qbpp-nav-mode', 'cpp'); } catch(e) {}
  }

  function showPython() {
    for (var i = 0; i < pythonItems.length; i++) pythonItems[i].style.display = '';
    for (var i = 0; i < cppItems.length; i++) cppItems[i].style.display = 'none';
    btnPython.style.background = '#7253ed';
    btnPython.style.color = '#fff';
    btnPython.style.borderColor = '#7253ed';
    btnCpp.style.background = '';
    btnCpp.style.color = '';
    btnCpp.style.borderColor = '#ccc';
    try { localStorage.setItem('qbpp-nav-mode', 'python'); } catch(e) {}
  }

  btnCpp.addEventListener('click', showCpp);
  btnPython.addEventListener('click', showPython);

  // Auto-detect mode
  var saved = null;
  try { saved = localStorage.getItem('qbpp-nav-mode'); } catch(e) {}
  if (window.location.pathname.indexOf('/python') !== -1) {
    showPython();
  } else if (saved === 'python') {
    showPython();
  } else {
    showCpp();
  }
});
</script>
