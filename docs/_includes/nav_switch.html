<style>.site-nav { visibility: hidden; }</style>
<div style="display:flex; flex-direction:column; align-items:center; gap:0.3rem; padding:0.5rem 2rem;">
  <button class="qbpp-switch-cpp"
    style="font-weight:bold; padding:0.4rem 0; cursor:pointer; border:1px solid #ccc; border-radius:4px; font-size:0.85rem; width:100%; white-space:nowrap;">
    QUBO++ (C++)
  </button>
  <button class="qbpp-switch-python"
    style="font-weight:bold; padding:0.4rem 0; cursor:pointer; border:1px solid #ccc; border-radius:4px; font-size:0.85rem; width:100%; white-space:nowrap;">
    PyQBPP (Python)
  </button>
</div>

<script>
(function() {
  if (window._qbppNavInit) return;
  window._qbppNavInit = true;

  var doInit = function() {
    var navEls = document.querySelectorAll('.site-nav');
    var cppItems = [];
    var pythonItems = [];

    var releaseLinks = [];
    for (var n = 0; n < navEls.length; n++) {
      var allUls = navEls[n].querySelectorAll('ul.nav-list');
      for (var u = 0; u < allUls.length; u++) {
        var lis = allUls[u].children;
        for (var i = 0; i < lis.length; i++) {
          if (lis[i].tagName !== 'LI') continue;
          var a = lis[i].querySelector('a');
          if (!a) continue;
          var txt = a.childNodes[0] ? a.childNodes[0].textContent.trim() : a.textContent.trim();
          if (txt === 'Latest Release') { releaseLinks.push(a); }
          var shared = ['Home', 'HUBO and QUBO', 'License Management', 'Demos', 'Latest Release'];
          var isShared = false;
          for (var s = 0; s < shared.length; s++) {
            if (txt === shared[s]) { isShared = true; break; }
          }
          if (isShared) continue;
          var href = a.href || window.location.href;
          if (txt === 'PyQBPP (Python)' || href.indexOf('/python/') !== -1) {
            pythonItems.push(lis[i]);
          } else {
            cppItems.push(lis[i]);
          }
        }
      }
    }

    var btnsCpp = document.querySelectorAll('.qbpp-switch-cpp');
    var btnsPython = document.querySelectorAll('.qbpp-switch-python');

    var showMode = function(mode) {
      var i;
      if (mode === 'python') {
        for (i = 0; i < cppItems.length; i++) cppItems[i].style.display = 'none';
        for (i = 0; i < pythonItems.length; i++) pythonItems[i].style.display = '';
      } else {
        for (i = 0; i < pythonItems.length; i++) pythonItems[i].style.display = 'none';
        for (i = 0; i < cppItems.length; i++) cppItems[i].style.display = '';
      }
      for (i = 0; i < btnsCpp.length; i++) {
        btnsCpp[i].style.background = mode === 'cpp' ? '#7253ed' : '';
        btnsCpp[i].style.color = mode === 'cpp' ? '#fff' : '';
        btnsCpp[i].style.borderColor = mode === 'cpp' ? '#7253ed' : '#ccc';
      }
      for (i = 0; i < btnsPython.length; i++) {
        btnsPython[i].style.background = mode === 'python' ? '#7253ed' : '';
        btnsPython[i].style.color = mode === 'python' ? '#fff' : '';
        btnsPython[i].style.borderColor = mode === 'python' ? '#7253ed' : '#ccc';
      }
      for (i = 0; i < releaseLinks.length; i++) {
        releaseLinks[i].setAttribute('href', mode === 'python'
          ? 'https://pypi.org/project/pyqbpp/'
          : 'https://github.com/nakanocs/qbpp/releases/latest');
      }
      try { localStorage.setItem('qbpp-nav-mode', mode); } catch(e) {}
    };

    for (var i = 0; i < btnsCpp.length; i++) {
      btnsCpp[i].addEventListener('click', function() { showMode('cpp'); });
    }
    for (var i = 0; i < btnsPython.length; i++) {
      btnsPython[i].addEventListener('click', function() { showMode('python'); });
    }

    var saved = null;
    try { saved = localStorage.getItem('qbpp-nav-mode'); } catch(e) {}
    if (window.location.pathname.indexOf('/python') !== -1) {
      showMode('python');
    } else if (saved === 'python') {
      showMode('python');
    } else {
      showMode('cpp');
    }
    for (var n = 0; n < navEls.length; n++) {
      navEls[n].style.visibility = 'visible';
    }
  };

  var tryInit = function() {
    var navEls = document.querySelectorAll('.site-nav');
    var found = false;
    for (var n = 0; n < navEls.length; n++) {
      var ul = navEls[n].querySelector('ul.nav-list');
      if (ul && ul.children.length > 0) { found = true; break; }
    }
    if (found) {
      doInit();
    } else {
      setTimeout(tryInit, 100);
    }
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(tryInit, 50); });
  } else {
    setTimeout(tryInit, 50);
  }
})();
</script>
